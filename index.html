<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paputerra 2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
    font-family: 'Press Start 2P', Arial;
    background: #0b0e17;
    color: #fff;
    text-align: center;
    padding: 20px;
    margin: 0;
}

/* Árbol de Terraria */
.tree {
    font-size: 3.5rem;
    margin-bottom: 10px;
    animation: sway 4s infinite ease-in-out;
    display: inline-block;
}

/* Títulos */
.neon-title {
    font-size: 2.3rem;
    color: #00ff41;
    text-shadow: 
        0 0 10px #00ff41,
        0 0 25px #00ff41,
        0 0 45px #00ff88;
    margin: 5px 0 15px 0;
    animation: float 3s infinite ease-in-out;
    line-height: 1.05;
}

.subtitle {
    font-size: 1.15rem;
    color: #00ff99;
    text-shadow: 0 0 12px #00ff99;
    margin: 5px 0 30px 0;
    animation: float 4s infinite ease-in-out;
}

/* IP */
.ip {
    font-size: 0.95rem;
    word-break: break-all;
    background: #111827;
    padding: 12px;
    border-radius: 6px;
    margin: 12px 0;
    font-family: monospace;
}

/* Servidores */
.server {
    background: #1a1f2e;
    margin: 22px auto;
    padding: 22px;
    border-radius: 12px;
    max-width: 420px;
    border: 4px solid #5c4033;
}

.server:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
}

/* Botones */
button {
    width: 100%;
    max-width: 380px;
    padding: 14px;
    margin: 8px auto;
    display: block;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
    font-family: 'Press Start 2P', Arial;
}

.copy-btn { background: #ffaa00; color: #000; }
.start-btn { background: #00ffaa; color: #000; }

button:active {
    transform: scale(0.95);
}

/* Animaciones */
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

@keyframes sway {
    0%, 100% { transform: rotate(-6deg); }
    50% { transform: rotate(6deg); }
}
</style>
</head>
<body>

<!-- Árbol de Terraria -->
<div class="tree">🌳</div>

<h1 class="neon-title">PAPUTERRA<br>2.0</h1>
<h2 class="subtitle">🐱 SERVIDORES TERRARIA</h2>

<div class="server">
<h2>Servidor 1</h2>
<div class="ip">poloforge2.terrariaforge<span>.com</span>:11150</div>
<button onclick="copyIP('poloforge2.terrariaforge.com:11150')" class="copy-btn">📋 Copiar IP</button>
<button onclick="window.open('https://www.terrariaforge.com/servers','_blank')" class="start-btn">🚀 Iniciar Servidor 1</button>
</div>

<div class="server">
<h2>Servidor 2</h2>
<div class="ip">51.77.85.56:50830</div>
<button onclick="copyIP('51.77.85.56:50830')" class="copy-btn">📋 Copiar IP</button>
<button onclick="window.open('https://panel.searcade.com/servers','_blank')" class="start-btn">🚀 Iniciar Servidor 2</button>
</div>

<div class="server">
<h2>Servidor 3</h2>
<div class="ip">51.77.85.56:50835</div>
<button onclick="copyIP('51.77.85.56:50835')" class="copy-btn">📋 Copiar IP</button>
<button onclick="window.open('https://panel.searcade.com/servers','_blank')" class="start-btn">🚀 Iniciar Servidor 3</button>
</div>

<script>
function copyIP(ip) { 
    navigator.clipboard.writeText(ip).then(() => alert('✅ IP copiada: ' + ip)); 
}
</script>

</body>
</html>
